name: lint
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: node --version && npx oxlint --version

      - name: "1. set-state-in-render (expect: error)"
        run: pnpm lint src/set-state-in-render.tsx --format=github
        continue-on-error: true

      - name: "2. effect — no deps (expect: error)"
        run: pnpm lint src/effect-no-deps.tsx --format=github
        continue-on-error: true

      - name: "3. effect — empty deps [] (expect: error)"
        run: pnpm lint src/effect-empty-deps.tsx --format=github
        continue-on-error: true

      - name: "4. effect — deps, simple setX(value) (expect: error)"
        run: pnpm lint src/effect-with-deps-simple.tsx --format=github
        continue-on-error: true

      - name: "5. effect — deps, if/else branches (expect: error)"
        run: pnpm lint src/effect-with-deps-conditional.tsx --format=github
        continue-on-error: true

      - name: "6. effect — deps, if only (expect: error)"
        run: pnpm lint src/effect-with-deps-if-only.tsx --format=github
        continue-on-error: true

      - name: "7. effect — deps, multi-statement (expect: error)"
        run: pnpm lint src/effect-with-deps-multi-statement.tsx --format=github
        continue-on-error: true

      - name: "8. effect — deps, comment before setState (expect: error)"
        run: pnpm lint src/effect-with-deps-comment.tsx --format=github
        continue-on-error: true

      - name: Summary
        run: echo "All steps should fail. Any step that passes is a missed violation."
